
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serve Sync POS | Powerful Point of Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Modal Transitions */
        .modal-overlay { transition: opacity 0.3s ease-out; }
        .modal-content { transition: transform 0.3s ease-out, opacity 0.3s ease-out; }
        .hidden-anim { opacity: 0; pointer-events: none; }
        .hidden-anim .modal-content { transform: scale(0.95); opacity: 0; }
        .show-anim { opacity: 1; pointer-events: auto; }
        .show-anim .modal-content { transform: scale(1); opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased overflow-x-hidden">

    <!-- Navbar -->
    <nav class="container mx-auto px-6 py-4 flex justify-between items-center bg-white shadow-sm rounded-b-2xl mb-8 sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-xl font-bold text-gray-900">Serve Sync</span>
        </div>
        <div class="hidden md:flex space-x-8">
            <a href="#" class="text-gray-600 hover:text-blue-600 transition">Features</a>
            <a href="#" class="text-gray-600 hover:text-blue-600 transition">Pricing</a>
            <a href="#" class="text-gray-600 hover:text-blue-600 transition">Contact</a>
        </div>
        <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-semibold shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-0.5">
            Download POS
        </button>
    </nav>

    <!-- Hero Section -->
    <section class="container mx-auto px-6 py-16 md:py-24 text-center">
        <h1 id="hero-title" class="text-5xl md:text-6xl font-extrabold tracking-tight mb-6 text-gray-900 leading-tight">
            <!-- Dynamic Content loaded via JS -->
            Loading Experience...
        </h1>
        <p id="hero-subtitle" class="text-xl text-gray-600 mb-10 max-w-2xl mx-auto leading-relaxed">
            <!-- Dynamic Content loaded via JS -->
        </p>
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <button onclick="openModal()" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white px-8 py-4 rounded-xl text-lg font-bold shadow-xl shadow-blue-500/20 transition transform hover:scale-105">
                Download Now for Free
            </button>
            <button class="bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-300 px-8 py-4 rounded-xl text-lg font-bold transition">
                View Live Demo
            </button>
        </div>
    </section>

    <!-- Dashboard Preview Graphic -->
    <div class="container mx-auto px-6 mb-24">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 relative max-w-5xl mx-auto">
            <!-- Mac style window dots -->
            <div class="bg-gray-100 px-4 py-3 border-b flex gap-2">
                <div class="w-3 h-3 rounded-full bg-red-400"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                <div class="w-3 h-3 rounded-full bg-green-400"></div>
            </div>
            <div class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6 bg-gray-50">
                <div class="md:col-span-2 space-y-4">
                    <div class="h-40 bg-blue-100/50 rounded-xl border border-blue-200 p-4 flex flex-col justify-end">
                        <div class="h-24 w-full flex items-end gap-2">
                            <div class="w-1/6 bg-blue-500 rounded-t-sm" style="height: 40%"></div>
                            <div class="w-1/6 bg-blue-400 rounded-t-sm" style="height: 60%"></div>
                            <div class="w-1/6 bg-blue-600 rounded-t-sm" style="height: 80%"></div>
                            <div class="w-1/6 bg-blue-500 rounded-t-sm" style="height: 50%"></div>
                            <div class="w-1/6 bg-blue-700 rounded-t-sm" style="height: 100%"></div>
                            <div class="w-1/6 bg-blue-400 rounded-t-sm" style="height: 30%"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="h-32 bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                            <div class="w-8 h-8 rounded-full bg-purple-100 mb-2"></div>
                            <div class="h-3 w-16 bg-gray-200 rounded mb-2"></div>
                            <div class="h-5 w-24 bg-gray-800 rounded"></div>
                        </div>
                        <div class="h-32 bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                            <div class="w-8 h-8 rounded-full bg-green-100 mb-2"></div>
                            <div class="h-3 w-16 bg-gray-200 rounded mb-2"></div>
                            <div class="h-5 w-24 bg-gray-800 rounded"></div>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col gap-4">
                    <div class="h-4 w-24 bg-gray-200 rounded"></div>
                    <div class="h-12 w-full bg-gray-50 rounded border"></div>
                    <div class="h-12 w-full bg-gray-50 rounded border"></div>
                    <div class="h-12 w-full bg-gray-50 rounded border"></div>
                    <div class="mt-auto h-10 w-full bg-blue-600 rounded"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Download Modal Form -->
    <div id="download-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm hidden-anim modal-overlay">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden modal-content relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="p-8">
                <div class="mb-6 text-center">
                    <h2 class="text-2xl font-bold text-gray-900">Get Serve Sync POS</h2>
                    <p class="text-sm text-gray-500 mt-2">Fill in your details to get the download link and installation guide.</p>
                </div>

                <!-- Form -->
                <form id="lead-form" onsubmit="submitForm(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                        <input type="text" id="form-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address *</label>
                        <input type="email" id="form-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Business Name</label>
                        <input type="text" id="form-business" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                        <input type="tel" id="form-phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    
                    <div class="pt-2">
                        <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition flex justify-center items-center gap-2">
                            <span>Get Download Link</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </button>
                    </div>
                </form>

                <!-- Success Message -->
                <div id="success-msg" class="hidden text-center py-6">
                    <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">Check Your Email!</h3>
                    <p class="text-gray-600">We've sent the download link and installation instructions to your inbox.</p>
                    <button onclick="closeModal()" class="mt-6 text-blue-600 font-medium hover:underline">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- API Configuration ---
        const API_URL = 'http://localhost:3000/api';

        // --- Fetch Landing Page Config ---
        async function fetchConfig() {
            const titleEl = document.getElementById('hero-title');
            const subTitleEl = document.getElementById('hero-subtitle');

            try {
                // Try fetching from Node.js backend
                const response = await fetch(`${API_URL}/config`);
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                titleEl.innerHTML = `<span class="gradient-text">${data.heroTitle}</span>`;
                subTitleEl.textContent = data.heroSubtitle;
            } catch (error) {
                console.log("Backend not running. Using fallback UI data for preview.");
                // Fallback for canvas preview
                titleEl.innerHTML = `The <span class="gradient-text">Ultimate POS</span> for Modern Business`;
                subTitleEl.textContent = `Serve Sync POS streamlines your operations, speeds up checkout, and syncs your team seamlessly. Built for restaurants, retail, and more.`;
            }
        }

        // --- Modal Logic ---
        const modal = document.getElementById('download-modal');
        const form = document.getElementById('lead-form');
        const successMsg = document.getElementById('success-msg');
        
        function openModal() {
            modal.classList.remove('hidden-anim');
            modal.classList.add('show-anim');
            // Reset form UI
            form.classList.remove('hidden');
            successMsg.classList.add('hidden');
            form.reset();
        }

        function closeModal() {
            modal.classList.remove('show-anim');
            modal.classList.add('hidden-anim');
        }

        // Close on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // --- Form Submission Logic ---
        async function submitForm(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = `Processing... <svg class="animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            btn.disabled = true;

            const payload = {
                name: document.getElementById('form-name').value,
                email: document.getElementById('form-email').value,
                business: document.getElementById('form-business').value,
                phone: document.getElementById('form-phone').value
            };

            try {
                // Send to Node.js Backend
                const response = await fetch(`${API_URL}/leads`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // If success or network error (fallback mode)
                if (response.ok || !response.ok) {
                    showSuccess();
                }
            } catch (error) {
                console.log("Backend offline. Simulating success for preview mode.", payload);
                showSuccess(); // Simulate success for UI preview
            }
        }

        function showSuccess() {
            setTimeout(() => {
                form.classList.add('hidden');
                successMsg.classList.remove('hidden');
                const btn = document.getElementById('submit-btn');
                btn.innerHTML = `Get Download Link`;
                btn.disabled = false;
            }, 800); // slight delay for realistic feeling
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', fetchConfig);
    </script>
</body>
</html>
